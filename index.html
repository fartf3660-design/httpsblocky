<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini - Block Coding</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #181818; --accent: #3d5afe; --text: #efefef; --trash: #ff1744; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        header { 
            height: 50px; background: #000; display: flex; align-items: center; 
            padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #333;
        }

        #app { display: flex; height: calc(100vh - 50px); }

        /* Sidebar */
        #sidebar { width: 220px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .cat-label { padding: 15px 10px 5px; font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; }
        .block-tool { 
            margin: 5px 10px; padding: 10px; background: #2a2a2a; border-radius: 4px; 
            cursor: grab; font-size: 13px; border: 1px solid #444; transition: 0.2s;
        }
        .block-tool:hover { background: #333; }

        /* Workspace */
        #workspace { flex: 2; position: relative; overflow: hidden; background: #121212; }
        
        /* Code View */
        #viewer { width: 300px; background: #050505; border-left: 1px solid #333; display: flex; flex-direction: column; }
        #code-out { flex: 1; padding: 15px; font-family: 'Fira Code', monospace; font-size: 12px; color: #4caf50; overflow: auto; margin: 0; }

        /* Real Blocks */
        .block { 
            position: absolute; min-width: 180px; background: #222; border-radius: 6px; 
            border: 1px solid #444; padding: 10px; cursor: move; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .block-main { border: 2px solid var(--accent); min-height: 200px; width: 250px; z-index: 5; }
        .block-content { min-height: 100px; border: 1px dashed #444; margin-top: 10px; padding: 10px; border-radius: 4px; }
        
        .block input, .block select { 
            width: 100%; background: #111; border: 1px solid #444; color: #fff; 
            margin-top: 5px; padding: 4px; font-size: 12px; border-radius: 3px;
        }

        /* Trash */
        #trash-can {
            position: absolute; bottom: 20px; left: 240px; width: 60px; height: 60px;
            background: var(--trash); border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 24px; opacity: 0.7; transition: 0.3s;
        }
        #trash-can:hover { opacity: 1; transform: scale(1.1); }

        .btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: var(--accent);">GEMINI - BLOCK CODING</div>
    <button class="btn" onclick="exportFile()">DOWNLOAD HTML</button>
</header>

<div id="app">
    <div id="sidebar">
        <div class="cat-label">Logic</div>
        <div class="block-tool" draggable="true" data-type="main">🏠 Main Container</div>
        
        <div class="cat-label">Content</div>
        <div class="block-tool" draggable="true" data-type="text">📝 Text Content</div>
        <div class="block-tool" draggable="true" data-type="img">🖼️ Local Image</div>
        
        <div class="cat-label">Style</div>
        <div class="block-tool" draggable="true" data-type="bg">🎨 Page Color</div>
    </div>

    <div id="workspace" id="ws">
        <div id="trash-can">🗑️</div>
    </div>

    <div id="viewer">
        <div style="padding: 10px; background: #111; font-size: 11px; color: #555;">SOURCE CODE</div>
        <pre id="code-out"></pre>
    </div>
</div>

<script>
    const ws = document.getElementById('workspace');
    const codeOut = document.getElementById('code-out');
    let draggedEl = null;
    let offset = { x: 0, y: 0 };

    // 1. Drag and Drop from Sidebar
    document.querySelectorAll('.block-tool').forEach(tool => {
        tool.addEventListener('dragstart', e => { e.dataTransfer.setData('type', tool.dataset.type); });
    });

    ws.addEventListener('dragover', e => e.preventDefault());
    ws.addEventListener('drop', e => {
        e.preventDefault();
        const type = e.dataTransfer.getData('type');
        if (type) createBlock(type, e.clientX - 230, e.clientY - 60);
    });

    function createBlock(type, x, y) {
        const b = document.createElement('div');
        b.className = 'block ' + (type === 'main' ? 'block-main' : '');
        b.style.left = x + 'px';
        b.style.top = y + 'px';
        b.dataset.type = type;

        let inner = '';
        if (type === 'main') {
            inner = `<b>MAIN CONTAINER</b><div class="block-content" id="main-drop"></div>`;
        } else if (type === 'text') {
            inner = `TEXT<select onchange="update()"><option value="h1">Heading</option><option value="p">Paragraph</option></select>
                     <input type="text" value="Edit me..." oninput="update()">`;
        } else if (type === 'img') {
            inner = `IMAGE<input type="file" accept="image/*" onchange="update()">`;
        } else if (type === 'bg') {
            inner = `BG COLOR<input type="color" value="#ffffff" onchange="update()">`;
        }

        b.innerHTML = inner;
        makeDraggable(b);
        ws.appendChild(b);
        update();
    }

    function makeDraggable(el) {
        el.onmousedown = function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            draggedEl = el;
            const rect = el.getBoundingClientRect();
            offset.x = e.clientX - rect.left;
            offset.y = e.clientY - rect.top;
            el.style.zIndex = 1000;
        };
    }

    document.onmousemove = function(e) {
        if (!draggedEl) return;
        let x = e.clientX - offset.x - 220;
        let y = e.clientY - offset.y - 50;
        
        draggedEl.style.left = x + 'px';
        draggedEl.style.top = y + 'px';

        // Check if hovering over Main Block
        const main = document.querySelector('.block-main');
        if (main && draggedEl !== main) {
            const mRect = main.getBoundingClientRect();
            if (e.clientX > mRect.left && e.clientX < mRect.right && e.clientY > mRect.top && e.clientY < mRect.bottom) {
                main.querySelector('.block-content').appendChild(draggedEl);
                draggedEl.style.position = 'relative';
                draggedEl.style.left = '0';
                draggedEl.style.top = '0';
            } else if (draggedEl.parentElement !== ws) {
                ws.appendChild(draggedEl);
                draggedEl.style.position = 'absolute';
                draggedEl.style.left = x + 'px';
                draggedEl.style.top = y + 'px';
            }
        }

        // Trash check
        const trash = document.getElementById('trash-can').getBoundingClientRect();
        if (e.clientX > trash.left && e.clientX < trash.right && e.clientY > trash.top && e.clientY < trash.bottom) {
            draggedEl.style.border = "2px solid red";
        } else {
            draggedEl.style.border = "";
        }
    };

    document.onmouseup = function(e) {
        if (!draggedEl) return;
        const trash = document.getElementById('trash-can').getBoundingClientRect();
        if (e.clientX > trash.left && e.clientX < trash.right && e.clientY > trash.top && e.clientY < trash.bottom) {
            draggedEl.remove();
        }
        draggedEl.style.zIndex = 10;
        draggedEl = null;
        update();
    };

    function update() {
        const main = document.querySelector('.block-main');
        if (!main) { codeOut.innerText = "Add a 'Main Container' to generate code."; return; }
        
        const children = main.querySelectorAll('.block');
        let bodyHtml = '';
        let bgColor = '#ffffff';

        children.forEach(c => {
            const type = c.dataset.type;
            if (type === 'text') {
                const tag = c.querySelector('select').value;
                const txt = c.querySelector('input').value;
                bodyHtml += `  <${tag}>${txt}</${tag}>\n`;
            } else if (type === 'img') {
                const file = c.querySelector('input').files[0];
                const src = file ? URL.createObjectURL(file) : 'placeholder.jpg';
                bodyHtml += `  <img src="${src}" style="max-width:100%;">\n`;
            } else if (type === 'bg') {
                bgColor = c.querySelector('input').value;
            }
        });

        const final = `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { background: ${bgColor}; font-family: sans-serif; text-align: center; padding: 50px; }\n</style>\n</head>\n<body>\n${bodyHtml}</body>\n</html>`;
        codeOut.innerText = final;
    }

    function exportFile() {
        const blob = new Blob([codeOut.innerText], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
    }
</script>

</body>
</html>
