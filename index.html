<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Blueprint Studio</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        :root { --ue-dark: #1a1a1a; --ue-blue: #007bff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #2b2b2b; color: white; }
        
        header { 
            background: var(--ue-dark); padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #000;
        }

        #editor-wrapper { position: relative; height: calc(100vh - 60px); width: 100%; }
        
        /* Blockly Workspace */
        #blocklyDiv { height: 100%; width: 100%; }

        /* Code Overlay (Hidden by default) */
        #code-view { 
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: #1e1e1e; 
            color: #dcdcdc; padding: 20px; box-sizing: border-box;
            font-family: 'Consolas', monospace; white-space: pre-wrap;
            z-index: 10; overflow: auto;
        }

        .btn-toggle {
            background: var(--ue-blue); color: white; border: none;
            padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .btn-toggle:hover { background: #0056b3; }
        
        .status-bar { position: absolute; bottom: 10px; right: 20px; z-index: 20; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2em;">HTML BLUEPRINT</div>
    <div>
        <button class="btn-toggle" onclick="toggleView()" id="toggleBtn">VIEW CODE</button>
    </div>
</header>

<div id="editor-wrapper">
    <div id="blocklyDiv"></div>
    <div id="code-view" id="generated-code"></div>
    <div class="status-bar">Blueprint Mode: Active</div>
</div>

<!-- Toolbox -->
<xml id="toolbox" style="display: none">
    <category name="Structure" colour="230">
        <block type="html_root"></block>
    </category>
    <category name="Elements" colour="160">
        <block type="html_title"></block>
        <block type="html_paragraph"></block>
    </category>
    <category name="Input" colour="100">
        <block type="text"></block>
    </category>
</xml>

<script>
    // --- 1. Custom Block Definitions ---
    Blockly.Blocks['html_root'] = {
        init: function() {
            this.appendDummyInput().appendField("DOCUMENT (HTML)");
            this.appendStatementInput("CONTENT").setCheck(null);
            this.setColour(230);
        }
    };

    Blockly.Blocks['html_title'] = {
        init: function() {
            this.appendValueInput("VALUE").setCheck("String").appendField("H1 TITLE");
            this.setPreviousStatement(true, null);
            this.setNextStatement(true, null);
            this.setColour(160);
        }
    };

    Blockly.Blocks['html_paragraph'] = {
        init: function() {
            this.appendValueInput("VALUE").setCheck("String").appendField("PARAGRAPH");
            this.setPreviousStatement(true, null);
            this.setNextStatement(true, null);
            this.setColour(160);
        }
    };

    // --- 2. Code Generator Logic ---
    const htmlGen = new Blockly.Generator('HTML');

    htmlGen['html_root'] = function(block) {
        const body = htmlGen.statementToCode(block, 'CONTENT');
        return `<html>\n<body>\n${body}</body>\n</html>`;
    };

    htmlGen['html_title'] = function(block) {
        const text = htmlGen.valueToCode(block, 'VALUE', 0) || "''";
        return `  <h1>${text.replace(/'/g, "")}</h1>\n`;
    };

    htmlGen['html_paragraph'] = function(block) {
        const text = htmlGen.valueToCode(block, 'VALUE', 0) || "''";
        return `  <p>${text.replace(/'/g, "")}</p>\n`;
    };

    htmlGen['text'] = function(block) {
        return [block.getFieldValue('TEXT'), 0];
    };

    // --- 3. Initialization ---
    const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        theme: Blockly.Themes.Dark, // UE feel
        renderer: 'zelos' // Makes blocks look more like UE nodes
    });

    // --- 4. Toggle Logic ---
    let isCodeView = false;
    function toggleView() {
        const codeDiv = document.getElementById('code-view');
        const blocklyDiv = document.getElementById('blocklyDiv');
        const btn = document.getElementById('toggleBtn');
        
        isCodeView = !isCodeView;

        if (isCodeView) {
            const code = htmlGen.workspaceToCode(workspace);
            codeDiv.innerText = code;
            codeDiv.style.display = 'block';
            blocklyDiv.style.visibility = 'hidden';
            btn.innerText = "BACK TO BLUEPRINT";
        } else {
            codeDiv.style.display = 'none';
            blocklyDiv.style.visibility = 'visible';
            btn.innerText = "VIEW CODE";
        }
    }
</script>

</body>
</html>
