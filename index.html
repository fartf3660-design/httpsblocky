<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini - Block Coding</title>
    <style>
        :root { --bg: #f0f0f0; --panel: #e0e0e0; --accent: #0000ff; --text: #000; }
        body { margin: 0; font-family: "Courier New", monospace; background: var(--bg); color: var(--text); overflow: hidden; }
        
        header { 
            height: 40px; background: #ccc; display: flex; align-items: center; 
            padding: 0 10px; justify-content: space-between; border-bottom: 2px solid #888;
        }

        #app { display: flex; height: calc(100vh - 40px); }

        /* Sidebar with Categories */
        #sidebar { width: 250px; background: var(--panel); border-right: 2px solid #888; overflow-y: auto; }
        .cat-group { border-bottom: 1px solid #bbb; padding-bottom: 10px; }
        .cat-title { padding: 8px; font-size: 12px; font-weight: bold; background: #d0d0d0; border-bottom: 1px solid #888; }
        .block-tool { 
            margin: 4px 8px; padding: 6px; background: #fff; border: 1px solid #888;
            cursor: grab; font-size: 11px; text-align: center;
        }
        .block-tool:hover { background: #eee; }

        /* Workspace */
        #workspace { flex: 2; position: relative; background: #fff; overflow: auto; }
        
        /* Code View */
        #viewer { width: 300px; background: #eee; border-left: 2px solid #888; display: flex; flex-direction: column; }
        #code-out { flex: 1; padding: 10px; font-size: 11px; white-space: pre-wrap; overflow: auto; color: #000; }

        /* Blocks */
        .block { 
            position: absolute; width: 220px; background: #fff; border: 2px solid #000; 
            padding: 8px; z-index: 10; font-size: 12px;
        }
        .block-main { background: #ffffcc; min-height: 300px; width: 300px; z-index: 5; }
        .block-content { min-height: 100px; border: 1px dashed #000; margin-top: 5px; padding: 5px; }
        
        input, select { width: 100%; margin-top: 4px; font-family: monospace; font-size: 10px; border: 1px solid #000; }
        label { font-size: 9px; font-weight: bold; display: block; margin-top: 6px; }

        #trash { position: absolute; bottom: 10px; left: 260px; width: 80px; padding: 10px; background: #ff0000; color: #fff; text-align: center; font-weight: bold; border: 2px solid #000; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">GEMINI_BLOCK_CODING_V3</div>
    <button onclick="exportFile()" style="cursor:pointer;">[SAVE_PROJECT]</button>
</header>

<div id="app">
    <div id="sidebar">
        <div class="cat-group">
            <div class="cat-title">STRUCTURE</div>
            <div class="block-tool" draggable="true" data-type="main">Main Page</div>
            <div class="block-tool" draggable="true" data-type="div">Box Container</div>
        </div>
        <div class="cat-group">
            <div class="cat-title">TEXT</div>
            <div class="block-tool" draggable="true" data-type="h1">Large Header</div>
            <div class="block-tool" draggable="true" data-type="p">Paragraph</div>
            <div class="block-tool" draggable="true" data-type="link">Hyperlink</div>
        </div>
        <div class="cat-group">
            <div class="cat-title">MEDIA</div>
            <div class="block-tool" draggable="true" data-type="img">Image (URL/Local)</div>
            <div class="block-tool" draggable="true" data-type="video">Video URL</div>
        </div>
        <div class="cat-group">
            <div class="cat-title">STYLE</div>
            <div class="block-tool" draggable="true" data-type="bg">Background Settings</div>
            <div class="block-tool" draggable="true" data-type="border">Border Settings</div>
        </div>
        <div class="cat-group">
            <div class="cat-title" style="background:#ffcc00;">CHAOS PANEL</div>
            <div class="block-tool" draggable="true" data-type="chaos_btn">Chaos Popup Button</div>
            <div class="block-tool" draggable="true" data-type="chaos_img">Moving Image</div>
        </div>
    </div>

    <div id="workspace">
        <div id="trash">TRASH</div>
    </div>

    <div id="viewer">
        <div style="padding: 5px; background: #ccc; font-size: 10px; border-bottom: 1px solid #888;">RAW_SOURCE</div>
        <pre id="code-out"></pre>
    </div>
</div>

<script>
    const ws = document.getElementById('workspace');
    const codeOut = document.getElementById('code-out');
    let draggedEl = null;
    let offset = { x: 0, y: 0 };

    document.querySelectorAll('.block-tool').forEach(t => {
        t.ondragstart = (e) => e.dataTransfer.setData('type', t.dataset.type);
    });

    ws.ondragover = (e) => e.preventDefault();
    ws.ondrop = (e) => {
        const type = e.dataTransfer.getData('type');
        if (type) createBlock(type, e.clientX - 260, e.clientY - 50);
    };

    function createBlock(type, x, y) {
        const b = document.createElement('div');
        b.className = 'block ' + (type === 'main' ? 'block-main' : '');
        b.style.left = x + 'px'; b.style.top = y + 'px';
        b.dataset.type = type;

        let html = `<b>${type.toUpperCase()}</b>`;
        if (type === 'main' || type === 'div') html += `<div class="block-content"></div>`;
        else if (type === 'h1' || type === 'p') html += `<input type="text" value="Text Here" oninput="update()">`;
        else if (type === 'link') html += `<label>Text</label><input type="text" value="Click" oninput="update()"><label>URL</label><input type="text" value="http://" oninput="update()">`;
        else if (type === 'img') html += `<select onchange="update()"><option value="url">URL</option><option value="local">Local</option></select><input type="text" placeholder="URL" oninput="update()"><input type="file" style="display:none" onchange="handleFile(this)">`;
        else if (type === 'bg') html += `<select onchange="toggleBg(this)"><option value="color">Color</option><option value="url">Image URL</option><option value="local">Local Image</option></select><input type="color" onchange="update()"><input type="text" style="display:none" oninput="update()"><input type="file" style="display:none" onchange="handleFile(this)">`;
        else if (type === 'chaos_btn') html += `<label>Button Text</label><input type="text" value="DANGER"><label>Popup Image URL</label><input type="text" value="https://bit.ly/3yL"><label>Movement</label><select onchange="update()"><option value="none">None</option><option value="dvd">DVD Bounce</option><option value="crazy">Crazy</option></select>`;
        else if (type === 'chaos_img') html += `<label>Image URL</label><input type="text" value="https://bit.ly/3yL"><label>Speed</label><select onchange="update()"><option value="dvd">DVD</option><option value="jit">Little Movement</option></select>`;

        b.innerHTML = html + `<div style="font-size:8px; color:red; margin-top:5px;">DRAG TO MOVE / TRASH</div>`;
        b.onmousedown = (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') { draggedEl = b; offset.x = e.offsetX; offset.y = e.offsetY; b.style.zIndex = 100; } };
        ws.appendChild(b);
        update();
    }

    function toggleBg(sel) {
        const p = sel.parentElement;
        p.querySelectorAll('input').forEach(i => i.style.display = 'none');
        if (sel.value === 'color') p.querySelector('input[type="color"]').style.display = 'block';
        if (sel.value === 'url') p.querySelector('input[type="text"]').style.display = 'block';
        if (sel.value === 'local') p.querySelector('input[type="file"]').style.display = 'block';
        update();
    }

    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = (e) => { input.dataset.base64 = e.target.result; update(); };
        reader.readAsDataURL(input.files[0]);
    }

    window.onmousemove = (e) => {
        if (!draggedEl) return;
        let x = e.clientX - 250 - offset.x;
        let y = e.clientY - 40 - offset.y;
        draggedEl.style.left = x + 'px'; draggedEl.style.top = y + 'px';

        const main = document.querySelector('.block-main');
        if (main && draggedEl !== main) {
            const r = main.getBoundingClientRect();
            if (e.clientX > r.left && e.clientX < r.right && e.clientY > r.top && e.clientY < r.bottom) {
                main.querySelector('.block-content').appendChild(draggedEl);
                draggedEl.style.position = 'relative'; draggedEl.style.left = '0'; draggedEl.style.top = '0';
            } else if (draggedEl.parentElement !== ws) {
                ws.appendChild(draggedEl); draggedEl.style.position = 'absolute'; draggedEl.style.left = x + 'px'; draggedEl.style.top = y + 'px';
            }
        }
    };

    window.onmouseup = (e) => {
        if (!draggedEl) return;
        const t = document.getElementById('trash').getBoundingClientRect();
        if (e.clientX > t.left && e.clientX < t.right && e.clientY > t.top && e.clientY < t.bottom) draggedEl.remove();
        draggedEl = null; update();
    };

    function update() {
        const main = document.querySelector('.block-main');
        if (!main) { codeOut.innerText = "Add Main Page Block"; return; }
        
        let html = "", css = "body { background: white; text-align: center; font-family: sans-serif; }", js = "";
        const items = main.querySelectorAll('.block');

        items.forEach(i => {
            const t = i.dataset.type;
            const vals = Array.from(i.querySelectorAll('input, select')).map(v => v.value);
            
            if (t === 'h1') html += `<h1>${vals[0]}</h1>\n`;
            if (t === 'p') html += `<p>${vals[0]}</p>\n`;
            if (t === 'bg') {
                const mode = i.querySelector('select').value;
                if (mode === 'color') css = css.replace('white', i.querySelector('input[type="color"]').value);
                if (mode === 'url') css += `body { background: url('${i.querySelector('input[type="text"]').value}'); background-size: cover; }`;
                if (mode === 'local') css += `body { background: url('${i.querySelector('input[type="file"]').dataset.base64}'); background-size: cover; }`;
            }
            if (t === 'chaos_btn') {
                const id = "btn" + Math.floor(Math.random()*999);
                html += `<button id="${id}" onclick="alert('CHAOS!');" style="position:absolute;">${vals[0]}</button>\n`;
                if(vals[2] === 'dvd') js += `animateDVD('${id}');\n`;
                if(vals[2] === 'crazy') js += `animateCrazy('${id}');\n`;
            }
        });

        const chaosJS = `
        function animateDVD(id){
            let el = document.getElementById(id); let x=0, y=0, dx=2, dy=2;
            setInterval(() => {
                x+=dx; y+=dy; if(x+el.offsetWidth > window.innerWidth || x < 0) dx*=-1;
                if(y+el.offsetHeight > window.innerHeight || y < 0) dy*=-1;
                el.style.left = x+'px'; el.style.top = y+'px';
            }, 10);
        }
        function animateCrazy(id){
            let el = document.getElementById(id);
            setInterval(() => {
                el.style.left = Math.random()*window.innerWidth+'px';
                el.style.top = Math.random()*window.innerHeight+'px';
            }, 100);
        }`;

        codeOut.innerText = `<!DOCTYPE html>\n<html>\n<head>\n<style>\n${css}\n</style>\n</head>\n<body>\n${html}\n<script>\n${chaosJS}\n${js}<\/script>\n</body>\n</html>`;
    }

    function exportFile() {
        const b = new Blob([codeOut.innerText], {type:'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'my_chaos_site.html'; a.click();
    }
</script>
</body>
</html>
