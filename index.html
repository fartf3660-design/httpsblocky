<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gemini Blockly - HTML</title>
    <!-- Load Blockly Core -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    
    <style>
        :root { --accent: #4c97ff; --bg: #f9f9f9; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); overflow: hidden; }
        
        header { 
            height: 50px; background: var(--accent); color: white; 
            display: flex; align-items: center; padding: 0 20px; 
            justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #main-container { display: flex; height: calc(100vh - 50px); }
        #blocklyDiv { flex: 1; height: 100%; }

        .controls { display: flex; gap: 10px; }
        button { 
            padding: 8px 20px; border-radius: 20px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-run { background: #4caf50; color: white; }
        .btn-run:hover { background: #43a047; transform: scale(1.05); }
        .btn-clear { background: #ff4c4c; color: white; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2rem;">Gemini HTML Blocks</div>
    <div class="controls">
        <button class="btn-clear" onclick="clearWorkspace()">Clear</button>
        <button class="btn-run" onclick="runHTML()">▶ Run in New Tab</button>
    </div>
</header>

<div id="main-container">
    <div id="blocklyDiv"></div>
</div>

<!-- Toolbox Definition (The "Drawer" of blocks) -->
<xml id="toolbox" style="display: none">
    <category name="Structure" colour="#4c97ff">
        <block type="html_root"></block>
        <block type="html_container"></block>
    </category>
    <category name="Text Content" colour="#9966ff">
        <block type="html_heading"></block>
        <block type="html_paragraph"></block>
        <block type="text"></block>
    </category>
    <category name="Media" colour="#ff6680">
        <block type="html_image"></block>
    </category>
    <category name="Styles" colour="#59c059">
        <block type="html_style"></block>
    </category>
</xml>

<script>
    // 1. DEFINE CUSTOM BLOCKS
    Blockly.Blocks['html_root'] = {
        init: function() {
            this.appendDummyInput().appendField("Start HTML Page");
            this.appendStatementInput("content").setCheck(null).appendField("body");
            this.setColour(210);
            this.setTooltip("The root of your website.");
        }
    };

    Blockly.Blocks['html_container'] = {
        init: function() {
            this.appendDummyInput().appendField("Container (Div)");
            this.appendStatementInput("content").setCheck(null);
            this.setPreviousStatement(true, null);
            this.setNextStatement(true, null);
            this.setColour(160);
        }
    };

    Blockly.Blocks['html_heading'] = {
        init: function() {
            this.appendValueInput("text").setCheck("String").appendField("Heading");
            this.setPreviousStatement(true, null);
            this.setNextStatement(true, null);
            this.setColour(260);
        }
    };

    Blockly.Blocks['html_paragraph'] = {
        init: function() {
            this.appendValueInput("text").setCheck("String").appendField("Paragraph");
            this.setPreviousStatement(true, null);
            this.setNextStatement(true, null);
            this.setColour(260);
        }
    };

    Blockly.Blocks['html_image'] = {
        init: function() {
            this.appendValueInput("url").setCheck("String").appendField("Image URL");
            this.setPreviousStatement(true, null);
            this.setNextStatement(true, null);
            this.setColour(330);
        }
    };

    // 2. DEFINE GENERATORS (Turn blocks into HTML strings)
    const htmlGenerator = new Blockly.Generator('HTML');

    htmlGenerator['html_root'] = function(block) {
        const content = htmlGenerator.statementToCode(block, 'content');
        return `<!DOCTYPE html>\n<html>\n<body>\n${content}</body>\n</html>`;
    };

    htmlGenerator['html_container'] = function(block) {
        const content = htmlGenerator.statementToCode(block, 'content');
        return `<div style="border: 1px solid #ccc; padding: 20px; margin: 10px;">\n${content}</div>\n`;
    };

    htmlGenerator['html_heading'] = function(block) {
        const text = htmlGenerator.valueToCode(block, 'text', 0) || '""';
        return `<h1>${text.replace(/'/g, '') || 'Untitled'}</h1>\n`;
    };

    htmlGenerator['html_paragraph'] = function(block) {
        const text = htmlGenerator.valueToCode(block, 'text', 0) || '""';
        return `<p>${text.replace(/'/g, '') || '...'}</p>\n`;
    };

    htmlGenerator['html_image'] = function(block) {
        const url = htmlGenerator.valueToCode(block, 'url', 0) || '""';
        return `<img src=${url} style="max-width: 100%;">\n`;
    };

    htmlGenerator['text'] = function(block) {
        return [block.getFieldValue('TEXT'), 0];
    };

    // 3. INJECT BLOCKLY
    const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        scrollbars: true,
        move: { scrollbars: true, drag: true, wheel: true },
        zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2 }
    });

    // 4. RUN FUNCTION (The "Scratch" way)
    function runHTML() {
        const code = htmlGenerator.workspaceToCode(workspace);
        
        if (!code.includes('<html>')) {
            alert("Please use the 'Start HTML Page' block first!");
            return;
        }

        // Create a data blob so we can open it as a real URL
        const blob = new Blob([code], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
    }

    function clearWorkspace() {
        if (confirm("Clear all blocks?")) workspace.clear();
    }
</script>

</body>
</html>
