<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini - Ultra Block Engine</title>
    <style>
        :root { --accent: #000; --bg: #f0f0f0; --sidebar-w: 80px; --panel-w: 240px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }
        
        header { height: 50px; background: #000; color: #fff; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 100; position: relative; }
        #main-container { display: flex; height: calc(100vh - 50px); position: relative; }

        /* Sidebar & Sliding Panels */
        #sidebar { width: var(--sidebar-w); background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding-top: 15px; z-index: 60; border-right: 1px solid #333; }
        .cat-btn { width: 60px; height: 60px; margin-bottom: 10px; background: #333; color: #aaa; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; border-radius: 8px; border: none; transition: 0.2s; }
        .cat-btn:hover, .cat-btn.active { background: #fff; color: #000; transform: scale(1.05); }

        #tab-panel { width: var(--panel-w); background: #fff; border-right: 1px solid #ccc; position: absolute; left: var(--sidebar-w); top: 0; bottom: 0; transform: translateX(-110%); transition: transform 0.4s; z-index: 50; overflow-y: auto; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
        #tab-panel.open { transform: translateX(0); }
        .tool { padding: 12px; background: #f9f9f9; border: 1px solid #ddd; cursor: grab; font-size: 12px; margin-bottom: 10px; border-radius: 5px; font-weight: 600; color: #444; }
        .tool:hover { background: #000; color: #fff; }

        /* Workspace */
        #workspace { flex: 1; position: relative; background: #fff; overflow: auto; padding: 80px; }
        .block { position: absolute; width: 250px; background: #fff; border: 2px solid #000; padding: 15px; z-index: 10; box-shadow: 5px 5px 0px #eee; }
        .block-main { width: 450px; min-height: 700px; border: 4px solid #000; background: #fff; }
        .drop-zone { min-height: 600px; border: 2px dashed #ccc; margin-top: 15px; padding: 15px; background: #fafafa; }

        label { font-size: 10px; color: #777; font-weight: bold; margin-top: 10px; display: block; text-transform: uppercase; }
        input, select, textarea { width: 100%; margin-top: 5px; padding: 8px; border: 1px solid #bbb; font-size: 12px; box-sizing: border-box; }

        /* Controls */
        #trash { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 40px; background: #ff3e3e; color: #fff; font-weight: bold; border-radius: 50px; cursor: pointer; border: 3px solid #000; z-index: 200; }
        #viewer { width: 400px; background: #222; border-left: 2px solid #000; display: flex; flex-direction: column; }
        #code-out { flex: 1; padding: 15px; font-family: monospace; font-size: 11px; color: #00ff41; overflow: auto; white-space: pre-wrap; margin: 0; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;">GEMINI BLOCK ENGINE v6.0</div>
    <button style="background:#00ff41; border:none; padding:10px; font-weight:bold; cursor:pointer;" onclick="exportFile()">EXPORT index.html</button>
</header>

<div id="main-container">
    <div id="sidebar">
        <button class="cat-btn" onclick="toggleTab('core', this)">📦 CORE</button>
        <button class="cat-btn" onclick="toggleTab('text', this)">✍️ TEXT</button>
        <button class="cat-btn" onclick="toggleTab('forms', this)">📝 FORMS</button>
        <button class="cat-btn" onclick="toggleTab('logic', this)">🔐 LOGIC</button>
        <button class="cat-btn" onclick="toggleTab('media', this)">🎬 MEDIA</button>
    </div>

    <div id="tab-panel">
        <div id="tab-content"></div>
    </div>

    <div id="workspace">
        <div id="trash">🗑️ TRASH</div>
    </div>

    <div id="viewer">
        <pre id="code-out"></pre>
    </div>
</div>

<script>
    const ws = document.getElementById('workspace');
    const panel = document.getElementById('tab-panel');
    const tabContent = document.getElementById('tab-content');
    const codeOut = document.getElementById('code-out');
    let draggedEl = null, offset = { x: 0, y: 0 };

    const library = {
        core: ['Main Container', 'Navigation Bar', 'Footer'],
        text: ['Heading H1', 'Subhead H2', 'Paragraph', 'Bullet List'],
        forms: ['Contact Form', 'Simple Button', 'Input Field'],
        logic: ['Password Lock', 'Base64 Encoder', 'Caesar Cipher'],
        media: ['Local Video', 'Local Audio', 'Web Image']
    };

    function toggleTab(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        if (panel.classList.contains('open') && panel.dataset.cat === cat) {
            panel.classList.remove('open');
        } else {
            panel.dataset.cat = cat; panel.classList.add('open'); btn.classList.add('active');
            tabContent.innerHTML = `<div style="font-weight:bold; margin-bottom:10px;">${cat.toUpperCase()}</div>`;
            library[cat].forEach(name => {
                const t = document.createElement('div');
                t.className = 'tool'; t.innerText = name; t.draggable = true;
                t.dataset.type = name.toLowerCase().replace(/ /g, '_');
                t.ondragstart = (e) => e.dataTransfer.setData('type', t.dataset.type);
                tabContent.appendChild(t);
            });
        }
    }

    ws.ondragover = (e) => e.preventDefault();
    ws.ondrop = (e) => {
        const type = e.dataTransfer.getData('type');
        if (type) createBlock(type, e.clientX - 400, e.clientY - 150);
    };

    function createBlock(type, x, y) {
        const b = document.createElement('div');
        b.className = 'block ' + (type === 'main_container' ? 'block-main' : '');
        b.style.left = x + 'px'; b.style.top = y + 'px';
        b.dataset.type = type;

        let ui = `<b>${type.replace(/_/g,' ').toUpperCase()}</b>`;
        
        // CUSTOM UI FOR EVERY BLOCK
        if (type === 'main_container') ui += `<div class="drop-zone"></div>`;
        else if (type === 'heading_h1') ui += `<label>Title</label><input type="text" value="My Website" oninput="update()">`;
        else if (type === 'paragraph') ui += `<label>Text</label><textarea oninput="update()">Enter text...</textarea>`;
        else if (type === 'password_lock') ui += `<label>Set Password</label><input type="text" value="1234" oninput="update()">`;
        else if (type === 'simple_button') ui += `<label>Label</label><input type="text" value="Click Me" oninput="update()"><label>Alert Text</label><input type="text" value="Hello!" oninput="update()">`;
        else if (type === 'local_video' || type === 'local_audio') ui += `<label>Upload</label><input type="file" onchange="handleFile(this)">`;
        else if (type === 'web_image') ui += `<label>Image URL</label><input type="text" value="https://via.placeholder.com/150" oninput="update()">`;
        else if (type === 'caesar_cipher') ui += `<label>Secret Message</label><input type="text" value="Attack at dawn" oninput="update()"><label>Shift</label><input type="number" value="1" oninput="update()">`;
        else ui += `<label>Value</label><input type="text" oninput="update()">`;

        b.innerHTML = ui;
        b.onmousedown = (e) => { if(!['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) { draggedEl = b; offset.x = e.offsetX; offset.y = e.offsetY; } };
        ws.appendChild(b);
        update();
    }

    function handleFile(input) {
        const r = new FileReader();
        r.onload = (e) => { input.dataset.base64 = e.target.result; update(); };
        r.readAsDataURL(input.files[0]);
    }

    window.onmousemove = (e) => {
        if (!draggedEl) return;
        draggedEl.style.left = (e.clientX - offset.x - 300) + 'px';
        draggedEl.style.top = (e.clientY - offset.y - 50) + 'px';
        const main = document.querySelector('.block-main');
        if (main && draggedEl !== main) {
            const r = main.getBoundingClientRect();
            if (e.clientX > r.left && e.clientX < r.right && e.clientY > r.top && e.clientY < r.bottom) {
                main.querySelector('.drop-zone').appendChild(draggedEl);
                draggedEl.style.position = 'relative'; draggedEl.style.left = '0'; draggedEl.style.top = '0';
            }
        }
    };

    window.onmouseup = (e) => {
        if (!draggedEl) return;
        const t = document.getElementById('trash').getBoundingClientRect();
        if (e.clientX > t.left && e.clientX < t.right && e.clientY > t.top && e.clientY < t.bottom) draggedEl.remove();
        draggedEl = null; update();
    };

    function update() {
        const main = document.querySelector('.block-main');
        if (!main) { codeOut.innerText = "Add 'Main Container' first!"; return; }
        
        let html = "", css = "body{font-family:sans-serif; text-align:center; padding:50px; background:#fff;} .box{border:1px solid #000; padding:20px; margin:20px;}", js = "";
        const blocks = main.querySelectorAll('.block');

        blocks.forEach(b => {
            const type = b.dataset.type;
            const inputs = b.querySelectorAll('input, textarea');

            if (type === 'heading_h1') html += `<h1>${inputs[0].value}</h1>\n`;
            if (type === 'paragraph') html += `<p>${inputs[0].value}</p>\n`;
            if (type === 'web_image') html += `<img src="${inputs[0].value}" style="max-width:100%;">\n`;
            if (type === 'local_video') html += `<video controls width="100%"><source src="${inputs[0].dataset.base64 || ''}"></video>\n`;
            if (type === 'simple_button') {
                const id = "btn" + Math.floor(Math.random()*1000);
                html += `<button id="${id}">${inputs[0].value}</button>\n`;
                js += `document.getElementById('${id}').onclick = () => alert("${inputs[1].value}");\n`;
            }
            if (type === 'password_lock') {
                js += `if(prompt("Password?") !== "${inputs[0].value}") { document.body.innerHTML = "<h1>LOCKED</h1>"; }\n`;
            }
            if (type === 'caesar_cipher') {
                html += `<div class="box"><strong>Cipher:</strong> <span id="ciph"></span></div>\n`;
                js += `let s="${inputs[0].value}", shift=${inputs[1].value}, res=""; for(let i=0; i<s.length; i++){ res += String.fromCharCode(s.charCodeAt(i)+shift); } document.getElementById('ciph').innerText = res;\n`;
            }
            if (type === 'contact_form') {
                html += `<form class="box">Name: <input type="text"><br>Message: <textarea></textarea><br><button type="button">Send</button></form>\n`;
            }
        });

        codeOut.innerText = `<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
    }

    function exportFile() {
        const b = new Blob([codeOut.innerText], {type:'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'index.html'; a.click();
    }
</script>
</body>
</html>
