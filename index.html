<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Block Coding Studio</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #3399ff; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        header { 
            height: 60px; background: #000; display: flex; align-items: center; 
            padding: 0 20px; justify-content: space-between; border-bottom: 2px solid #333;
        }

        #editor-container { display: flex; height: calc(100vh - 60px); }

        /* Sidebar / Toolbox */
        #toolbox { 
            width: 200px; background: var(--panel); border-right: 2px solid #333; 
            padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }
        .block-template { 
            padding: 10px; border-radius: 6px; cursor: grab; font-weight: bold; font-size: 13px;
            user-select: none; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Workspace */
        #workspace { 
            flex: 2; position: relative; overflow: auto; 
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px; padding: 50px;
        }

        /* Live Code View */
        #code-view { 
            width: 350px; background: #0a0a0a; border-left: 2px solid #333; 
            display: flex; flex-direction: column;
        }
        #code-header { padding: 10px; font-size: 12px; background: #222; color: #888; }
        #code-output { flex: 1; padding: 20px; font-family: 'Consolas', monospace; color: #00ff00; white-space: pre-wrap; overflow-y: auto; }

        /* Custom Block Styling */
        .gemini-block { 
            width: fit-content; min-width: 150px; padding: 12px; border-radius: 8px; 
            margin-bottom: 8px; cursor: move; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .gemini-block input { 
            background: rgba(0,0,0,0.3); border: 1px solid #555; color: white; 
            padding: 4px; border-radius: 4px; font-size: 12px; margin-top: 5px; width: 130px;
        }
        .gemini-block .label { font-size: 11px; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; display: block;}
        
        /* Colors for different block types */
        .type-root { background: #4a148c; border-left: 5px solid #ab47bc; }
        .type-text { background: #1565c0; border-left: 5px solid #42a5f5; }
        .type-media { background: #2e7d32; border-left: 5px solid #66bb6a; }
        .type-button { background: #c62828; border-left: 5px solid #ef5350; }

        .btn-save { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; letter-spacing: 1px;">GEMINI - BLOCK CODING</div>
    <button class="btn-save" onclick="exportHTML()">SAVE WEBSITE (.html)</button>
</header>

<div id="editor-container">
    <div id="toolbox">
        <div style="font-size: 12px; color: #888; margin-bottom: 5px;">ELEMENTS</div>
        <div class="block-template type-root" draggable="true" data-type="root">🏠 START PAGE</div>
        <div class="block-template type-text" draggable="true" data-type="h1">🔠 BIG TEXT</div>
        <div class="block-template type-text" draggable="true" data-type="p">🔡 SMALL TEXT</div>
        <div class="block-template type-media" draggable="true" data-type="img">🖼️ PICTURE</div>
        <div class="block-template type-button" draggable="true" data-type="btn">🔘 BUTTON</div>
    </div>

    <div id="workspace">
        <!-- Dropped blocks go here -->
    </div>

    <div id="code-view">
        <div id="code-header">LIVE HTML SOURCE</div>
        <pre id="code-output"></pre>
    </div>
</div>

<script>
    const workspace = document.getElementById('workspace');
    const codeOutput = document.getElementById('code-output');
    const toolboxBlocks = document.querySelectorAll('.block-template');

    // Handle Dragging from Toolbox
    toolboxBlocks.forEach(block => {
        block.addEventListener('dragstart', e => {
            e.dataTransfer.setData('type', block.dataset.type);
        });
    });

    workspace.addEventListener('dragover', e => e.preventDefault());

    workspace.addEventListener('drop', e => {
        e.preventDefault();
        const type = e.dataTransfer.getData('type');
        if (type) createBlock(type, e.clientX - 250, e.clientY - 100);
    });

    function createBlock(type, x, y) {
        const block = document.createElement('div');
        block.className = `gemini-block type-${getBlockCategory(type)}`;
        block.dataset.tag = type;
        
        let content = '';
        if (type === 'root') content = `<b>🏠 MAIN PAGE</b><div class="container" style="min-height:50px; border:2px dashed #444; margin-top:10px; padding:10px;"></div>`;
        else if (type === 'h1') content = `<span class="label">Big Title</span><input type="text" value="Hello World" oninput="generateCode()">`;
        else if (type === 'p') content = `<span class="label">Paragraph</span><input type="text" value="Welcome to my site" oninput="generateCode()">`;
        else if (type === 'img') content = `<span class="label">Image URL or File</span><input type="text" value="https://via.placeholder.com/150" oninput="generateCode()">`;
        else if (type === 'btn') content = `<span class="label">Button Label</span><input type="text" value="Click Me" oninput="generateCode()">`;

        block.innerHTML = content + `<button onclick="this.parentElement.remove(); generateCode();" style="position:absolute; top:5px; right:5px; background:none; border:none; color:white; cursor:pointer;">×</button>`;
        
        workspace.appendChild(block);
        generateCode();
    }

    function getBlockCategory(type) {
        if (type === 'root') return 'root';
        if (type === 'h1' || type === 'p') return 'text';
        if (type === 'img') return 'media';
        return 'button';
    }

    function generateCode() {
        const blocks = workspace.querySelectorAll('.gemini-block');
        let html = '';
        let hasRoot = false;

        blocks.forEach(block => {
            const tag = block.dataset.tag;
            const input = block.querySelector('input');
            const val = input ? input.value : '';

            if (tag === 'root') {
                hasRoot = true;
                // For this simple version, we just wrap everything in the file
            } else if (tag === 'h1') html += `  <h1>${val}</h1>\n`;
            else if (tag === 'p') html += `  <p>${val}</p>\n`;
            else if (tag === 'img') html += `  <img src="${val}" style="max-width:100%;">\n`;
            else if (tag === 'btn') html += `  <button>${val}</button>\n`;
        });

        const fullCode = `<!DOCTYPE html>\n<html>\n<body style="font-family:sans-serif; text-align:center; padding:50px;">\n${html}</body>\n</html>`;
        codeOutput.innerText = fullCode;
    }

    function exportHTML() {
        const code = codeOutput.innerText;
        const blob = new Blob([code], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
    }
</script>

</body>
</html>
