<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini - Block Coding</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; color: #000; overflow: hidden; }
        header { height: 45px; background: #fff; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 1px solid #ccc; }
        #app { display: flex; height: calc(100vh - 45px); }

        /* Sidebar */
        #sidebar { width: 250px; background: #fdfdfd; border-right: 1px solid #ccc; overflow-y: auto; }
        .cat-title { padding: 10px; font-size: 11px; font-weight: bold; background: #eee; color: #555; text-transform: uppercase; border-bottom: 1px solid #ccc; }
        .block-tool { margin: 6px; padding: 8px; background: #fff; border: 1px solid #bbb; cursor: grab; font-size: 12px; border-radius: 2px; text-align: center; }
        .block-tool:hover { background: #f9f9f9; border-color: #000; }

        /* Workspace */
        #workspace { flex: 2; position: relative; background: #fff; overflow: auto; padding: 40px; }
        #trash { position: absolute; bottom: 20px; left: 270px; padding: 10px 20px; background: #cc0000; color: #fff; font-size: 12px; font-weight: bold; border-radius: 2px; cursor: pointer; z-index: 100; }

        /* Blocks */
        .block { position: absolute; width: 230px; background: #fff; border: 1px solid #000; padding: 12px; z-index: 10; box-shadow: 2px 2px 0px #ccc; }
        .block-main { border: 2px solid #000; min-height: 450px; width: 320px; background: #fafafa; }
        .block-content { min-height: 250px; border: 1px dashed #888; margin-top: 10px; padding: 10px; background: #fff; }
        
        .block b { display: block; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #eee; }
        .block label { display: block; font-size: 10px; color: #666; margin-top: 8px; font-weight: bold; }
        .block input, .block select { width: 100%; padding: 5px; margin-top: 4px; border: 1px solid #999; font-size: 11px; box-sizing: border-box; }

        /* Preview */
        #viewer { width: 340px; background: #fff; border-left: 1px solid #ccc; display: flex; flex-direction: column; }
        #code-out { flex: 1; padding: 10px; font-family: monospace; font-size: 11px; background: #f4f4f4; overflow: auto; border: none; margin: 0; color: #333; }
        .btn-export { background: #000; color: #fff; border: none; padding: 8px 15px; cursor: pointer; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">GEMINI - BLOCK CODING</div>
    <button class="btn-export" onclick="exportFile()">EXPORT HTML</button>
</header>

<div id="app">
    <div id="sidebar">
        <div class="cat-title">Basics</div>
        <div class="block-tool" draggable="true" data-type="main">Main Page Container</div>
        <div class="block-tool" draggable="true" data-type="h1">Heading</div>
        <div class="block-tool" draggable="true" data-type="p">Text Paragraph</div>
        
        <div class="cat-title">Media</div>
        <div class="block-tool" draggable="true" data-type="video">Video Element</div>
        <div class="block-tool" draggable="true" data-type="img">Image Element</div>
        
        <div class="cat-title">Styling</div>
        <div class="block-tool" draggable="true" data-type="bg">Background Settings</div>
    </div>

    <div id="workspace">
        <div id="trash">TRASH CAN</div>
    </div>

    <div id="viewer">
        <div style="padding: 8px; background: #ddd; font-size: 10px; font-weight: bold;">SOURCE CODE</div>
        <pre id="code-out"></pre>
    </div>
</div>

<script>
    const ws = document.getElementById('workspace');
    const codeOut = document.getElementById('code-out');
    let draggedEl = null;
    let offset = { x: 0, y: 0 };

    document.querySelectorAll('.block-tool').forEach(t => {
        t.ondragstart = (e) => e.dataTransfer.setData('type', t.dataset.type);
    });

    ws.ondragover = (e) => e.preventDefault();
    ws.ondrop = (e) => {
        const type = e.dataTransfer.getData('type');
        if (type) createBlock(type, e.clientX - 280, e.clientY - 80);
    };

    function createBlock(type, x, y) {
        const b = document.createElement('div');
        b.className = 'block ' + (type === 'main' ? 'block-main' : '');
        b.style.left = x + 'px'; b.style.top = y + 'px';
        b.dataset.type = type;

        let ui = `<b>${type.toUpperCase()}</b>`;
        
        if (type === 'main') {
            ui += `<div class="block-content"></div>`;
        } else if (type === 'h1' || type === 'p') {
            ui += `<label>Text Content</label><input type="text" value="New Content" oninput="update()">`;
        } else if (type === 'video') {
            ui += `<label>Source Mode</label>
                   <select onchange="toggleVidFields(this)">
                       <option value="url">Web URL / YouTube</option>
                       <option value="local">Local File</option>
                   </select>
                   <div class="vid-url-field">
                       <label>URL</label><input type="text" placeholder="https://..." oninput="update()">
                       <label>YouTube Mode?</label><select onchange="update()"><option value="n">No</option><option value="y">Yes</option></select>
                   </div>
                   <div class="vid-local-field" style="display:none;">
                       <label>Local Video File</label><input type="file" accept="video/*" onchange="handleFile(this)">
                   </div>`;
        } else if (type === 'img') {
            ui += `<label>Source Mode</label><select onchange="toggleIn(this,0,1)"><option value="u">URL</option><option value="l">Local</option></select>
                   <input type="text" placeholder="URL" oninput="update()"><input type="file" style="display:none" onchange="handleFile(this)">`;
        } else if (type === 'bg') {
            ui += `<label>Background Type</label><select onchange="toggleIn(this,0,1)"><option value="c">Color</option><option value="l">Local Image</option></select>
                   <input type="color" onchange="update()"><input type="file" style="display:none" onchange="handleFile(this)">`;
        }

        b.innerHTML = ui;
        b.onmousedown = (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') { draggedEl = b; offset.x = e.offsetX; offset.y = e.offsetY; b.style.zIndex = 1000; } };
        ws.appendChild(b);
        update();
    }

    function toggleVidFields(sel) {
        const p = sel.parentElement;
        p.querySelector('.vid-url-field').style.display = sel.value === 'url' ? 'block' : 'none';
        p.querySelector('.vid-local-field').style.display = sel.value === 'local' ? 'block' : 'none';
        update();
    }

    function toggleIn(sel, idx1, idx2) {
        const ins = sel.parentElement.querySelectorAll('input');
        ins[idx1].style.display = sel.value === 'u' || sel.value === 'c' ? 'block' : 'none';
        ins[idx2].style.display = sel.value === 'l' ? 'block' : 'none';
        update();
    }

    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = (e) => { input.dataset.base64 = e.target.result; update(); };
        reader.readAsDataURL(input.files[0]);
    }

    window.onmousemove = (e) => {
        if (!draggedEl) return;
        let x = e.clientX - offset.x - 240;
        let y = e.clientY - offset.y - 45;
        draggedEl.style.left = x + 'px'; draggedEl.style.top = y + 'px';

        const main = document.querySelector('.block-main');
        if (main && draggedEl !== main) {
            const r = main.getBoundingClientRect();
            if (e.clientX > r.left && e.clientX < r.right && e.clientY > r.top && e.clientY < r.bottom) {
                main.querySelector('.block-content').appendChild(draggedEl);
                draggedEl.style.position = 'relative'; draggedEl.style.left = '0'; draggedEl.style.top = '0';
            } else if (draggedEl.parentElement !== ws) {
                ws.appendChild(draggedEl); draggedEl.style.position = 'absolute';
            }
        }
    };

    window.onmouseup = (e) => {
        if (!draggedEl) return;
        const t = document.getElementById('trash').getBoundingClientRect();
        if (e.clientX > t.left && e.clientX < t.right && e.clientY > t.top && e.clientY < t.bottom) draggedEl.remove();
        draggedEl = null; update();
    };

    function update() {
        const main = document.querySelector('.block-main');
        if (!main) { codeOut.innerText = "Add Main Container to start."; return; }
        
        let html = "", css = "body { background: white; text-align: center; font-family: sans-serif; padding: 20px; }", js = "";
        const items = main.querySelectorAll('.block');

        items.forEach(i => {
            const t = i.dataset.type;
            const ins = i.querySelectorAll('input, select');
            
            if (t === 'h1') html += `  <h1>${ins[0].value}</h1>\n`;
            if (t === 'p') html += `  <p>${ins[0].value}</p>\n`;
            if (t === 'img') {
                const src = ins[0].value === 'u' ? ins[1].value : (ins[2].dataset.base64 || "");
                html += `  <img src="${src}" style="max-width:100%; margin:10px;">\n`;
            }
            if (t === 'video') {
                const mode = ins[0].value;
                if (mode === 'url') {
                    let url = ins[1].value;
                    const isYT = ins[2].value === 'y';
                    if (isYT) {
                        url = url.replace("watch?v=", "embed/");
                        html += `  <iframe width="100%" height="315" src="${url}" frameborder="0" allowfullscreen></iframe>\n`;
                    } else {
                        html += `  <video width="100%" controls><source src="${url}"></video>\n`;
                    }
                } else {
                    const src = ins[3].dataset.base64 || "";
                    html += `  <video width="100%" controls><source src="${src}"></video>\n`;
                }
            }
            if (t === 'bg') {
                if (ins[0].value === 'c') css = css.replace('white', ins[1].value);
                else css += `body { background: url('${ins[2].dataset.base64}'); background-size: cover; }`;
            }
        });

        codeOut.innerText = `<!DOCTYPE html>\n<html>\n<head>\n<style>\n${css}\n</style>\n</head>\n<body>\n${html}</body>\n</html>`;
    }

    function exportFile() {
        const blob = new Blob([codeOut.innerText], {type:'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'index.html'; a.click();
    }
</script>
</body>
</html>
