<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint HTML Studio Pro</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        :root {
            --ue-bg: #151515;
            --ue-sidebar: #222222;
            --ue-accent: #3399ff;
            --ue-text: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--ue-bg); color: var(--ue-text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        header {
            height: 50px; background: #000;
            display: flex; align-items: center; padding: 0 20px;
            justify-content: space-between; border-bottom: 1px solid #333;
        }

        .brand { font-weight: 800; color: var(--ue-accent); }

        button {
            background: var(--ue-accent); color: white; border: none;
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            font-weight: 600; transition: 0.2s;
        }

        button:hover { background: #2288ee; }

        #main-container { display: flex; height: calc(100vh - 50px); }

        #blocklyDiv { flex: 1; height: 100%; }

        #code-panel {
            width: 350px; background: var(--ue-sidebar);
            border-left: 1px solid #333; display: flex; flex-direction: column;
        }

        .panel-header {
            padding: 10px; background: #111; font-size: 11px;
            text-transform: uppercase; border-bottom: 1px solid #333;
        }

        #code-display {
            flex: 1; padding: 15px; margin: 0;
            font-family: 'Consolas', monospace; font-size: 12px;
            color: #dcdcdc; overflow: auto; white-space: pre-wrap;
            background: #1a1a1a;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">HTML BLUEPRINT PRO</div>
    <button onclick="downloadHTML()">EXPORT HTML FILE</button>
</header>

<div id="main-container">
    <div id="blocklyDiv"></div>
    <div id="code-panel">
        <div class="panel-header">Live Source Preview</div>
        <pre id="code-display"></pre>
    </div>
</div>

<xml id="toolbox" style="display: none">
    <category name="Core" colour="#2c3e50">
        <block type="html_root"></block>
    </category>
    <category name="Layout" colour="#8e44ad">
        <block type="html_div"></block>
        <block type="html_section"></block>
        <block type="html_br"></block>
    </category>
    <category name="Text" colour="#2980b9">
        <block type="html_h1"></block>
        <block type="html_h2"></block>
        <block type="html_p"></block>
        <block type="text"></block>
    </category>
    <category name="Media" colour="#27ae60">
        <block type="html_img_local"></block>
        <block type="html_img_url"></block>
    </category>
    <category name="UI" colour="#d35400">
        <block type="html_button"></block>
        <block type="html_link"></block>
    </category>
</xml>

<script>
    // --- BLOCK DEFINITIONS ---
    Blockly.Blocks['html_root'] = {
        init: function() {
            this.appendDummyInput().appendField("DOCUMENT (HTML)");
            this.appendStatementInput("CONTENT").appendField("body content");
            this.setColour("#2c3e50");
        }
    };

    Blockly.Blocks['html_div'] = {
        init: function() {
            this.appendDummyInput().appendField("DIV (Box)");
            this.appendValueInput("CLASS").setCheck("String").appendField("class name");
            this.appendStatementInput("CONTENT");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour("#8e44ad");
        }
    };

    Blockly.Blocks['html_h1'] = {
        init: function() {
            this.appendValueInput("CONTENT").setCheck("String").appendField("H1 TITLE");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour("#2980b9");
        }
    };

    Blockly.Blocks['html_p'] = {
        init: function() {
            this.appendValueInput("CONTENT").setCheck("String").appendField("PARAGRAPH");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour("#2980b9");
        }
    };

    Blockly.Blocks['html_img_local'] = {
        init: function() {
            this.appendDummyInput().appendField("LOCAL IMAGE")
                .appendField(new Blockly.FieldTextInput("image.jpg"), "FILENAME");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour("#27ae60");
        }
    };

    Blockly.Blocks['html_button'] = {
        init: function() {
            this.appendValueInput("TEXT").setCheck("String").appendField("BUTTON");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour("#d35400");
        }
    };

    // --- GENERATOR LOGIC ---
    const htmlGen = new Blockly.Generator('HTML');

    htmlGen['html_root'] = function(block) {
        const body = htmlGen.statementToCode(block, 'CONTENT');
        return `<!DOCTYPE html>\n<html>\n<body style="font-family:sans-serif;">\n${body}</body>\n</html>`;
    };

    htmlGen['html_div'] = function(block) {
        const cls = htmlGen.valueToCode(block, 'CLASS', 0).replace(/'/g, "");
        const content = htmlGen.statementToCode(block, 'CONTENT');
        return `<div class="${cls}">\n${content}</div>\n`;
    };

    htmlGen['html_h1'] = function(block) {
        const val = htmlGen.valueToCode(block, 'CONTENT', 0).replace(/'/g, "");
        return `<h1>${val}</h1>\n`;
    };

    htmlGen['html_p'] = function(block) {
        const val = htmlGen.valueToCode(block, 'CONTENT', 0).replace(/'/g, "");
        return `<p>${val}</p>\n`;
    };

    htmlGen['html_img_local'] = function(block) {
        const file = block.getFieldValue('FILENAME');
        return `<img src="${file}" style="max-width:100%;">\n`;
    };

    htmlGen['html_button'] = function(block) {
        const txt = htmlGen.valueToCode(block, 'TEXT', 0).replace(/'/g, "");
        return `<button>${txt}</button>\n`;
    };

    htmlGen['text'] = function(block) {
        return [block.getFieldValue('TEXT'), 0];
    };

    // --- INITIALIZATION ---
    const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        theme: Blockly.Themes.Dark,
        renderer: 'zelos'
    });

    workspace.addChangeListener(() => {
        document.getElementById('code-display').innerText = htmlGen.workspaceToCode(workspace);
    });

    // --- EXPORT FUNCTION ---
    function downloadHTML() {
        const code = htmlGen.workspaceToCode(workspace);
        if(!code) return alert("Drag some blocks first!");
        const blob = new Blob([code], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
    }
</script>

</body>
</html>
