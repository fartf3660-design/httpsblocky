<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Easy Website Builder</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        header { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
        #main { display: flex; height: calc(100vh - 70px); }
        #blocklyDiv { flex: 3; }
        #codeArea { flex: 1; background: #252525; padding: 20px; font-family: monospace; overflow-y: auto; color: #00ff00; border-left: 2px solid #333; }
        .bake-button { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: bold;">🚀 MY FIRST WEBSITE</div>
    <button class="bake-button" onclick="downloadSite()">SAVE MY WEBSITE (.html)</button>
</header>

<div id="main">
    <div id="blocklyDiv"></div>
    <pre id="codeArea">Drag the 'START' block to begin!</pre>
</div>

<!-- Fixed Toolbox with Categories -->
<xml id="toolbox" style="display: none">
    <category name="1. START HERE" colour="260">
        <block type="start_box"></block>
    </category>
    <category name="2. TEXT" colour="200">
        <block type="big_text"></block>
        <block type="small_text"></block>
    </category>
    <category name="3. PICTURES" colour="100">
        <block type="picture_link"></block>
        <block type="local_picture"></block>
    </category>
    <category name="4. BUTTONS" colour="20">
        <block type="button_box"></block>
    </category>
</xml>

<script>
    // --- BLOCK DEFINITIONS ---
    Blockly.Blocks['start_box'] = {
        init: function() {
            this.appendDummyInput().appendField("🏠 START HERE");
            this.appendStatementInput("STACK").appendField("put stuff inside:");
            this.setColour(260);
        }
    };

    Blockly.Blocks['big_text'] = {
        init: function() {
            this.appendDummyInput().appendField("🔠 BIG TEXT:").appendField(new Blockly.FieldTextInput("Hello!"), "VAL");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour(200);
        }
    };

    Blockly.Blocks['small_text'] = {
        init: function() {
            this.appendDummyInput().appendField("🔡 tiny text:").appendField(new Blockly.FieldTextInput("Welcome"), "VAL");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour(180);
        }
    };

    Blockly.Blocks['picture_link'] = {
        init: function() {
            this.appendDummyInput().appendField("🖼️ WEB IMAGE").appendField(new Blockly.FieldTextInput("https://tinyurl.com/yckp89u9"), "URL");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour(100);
        }
    };

    Blockly.Blocks['local_picture'] = {
        init: function() {
            this.appendDummyInput().appendField("📂 MY COMPUTER IMAGE").appendField(new Blockly.FieldTextInput("photo.jpg"), "FILE");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour(120);
        }
    };

    Blockly.Blocks['button_box'] = {
        init: function() {
            this.appendDummyInput().appendField("🔘 BUTTON").appendField(new Blockly.FieldTextInput("Click Me!"), "VAL");
            this.setPreviousStatement(true); this.setNextStatement(true);
            this.setColour(20);
        }
    };

    // --- GENERATOR ---
    const engine = new Blockly.Generator('HTML');
    engine['start_box'] = function(block) {
        return `<!DOCTYPE html>\n<html>\n<body style="text-align:center; font-family:sans-serif;">\n${engine.statementToCode(block, 'STACK')}</body>\n</html>`;
    };
    engine['big_text'] = function(block) { return `<h1>${block.getFieldValue('VAL')}</h1>\n`; };
    engine['small_text'] = function(block) { return `<p>${block.getFieldValue('VAL')}</p>\n`; };
    engine['picture_link'] = function(block) { return `<img src="${block.getFieldValue('URL')}" style="width:300px;">\n`; };
    engine['local_picture'] = function(block) { return `<img src="${block.getFieldValue('FILE')}" style="width:300px;">\n`; };
    engine['button_box'] = function(block) { return `<button>${block.getFieldValue('VAL')}</button>\n`; };

    // --- INIT ---
    const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        theme: Blockly.Themes.Dark,
        renderer: 'zelos'
    });

    workspace.addChangeListener(() => {
        document.getElementById('codeArea').innerText = engine.workspaceToCode(workspace) || "Pick a block from the menu!";
    });

    function downloadSite() {
        const code = engine.workspaceToCode(workspace);
        if(!code.includes('<html>')) return alert("Use the START HERE block first!");
        const blob = new Blob([code], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
    }
</script>
</body>
</html>
